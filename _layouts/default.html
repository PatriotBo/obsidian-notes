<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <span class="logo-icon">📚</span> {{ site.title }}
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/tags' | relative_url }}">标签</a>
      </nav>
    </div>
  </header>
  <main class="container main-content">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>Powered by <a href="https://pages.github.com">GitHub Pages</a> · 由 WorkBuddy 笔记助手生成</p>
    </div>
  </footer>
</body>
</html>
